{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">📖 Catálogo de Biblioteca</h1>
    <div class="row">
        {% for libro in libros %}
        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-info shadow h-100 py-2">
                <div class="card-body">
                    <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Libro Disponible</div>
                    <div class="h5 mb-0 font-weight-bold text-gray-800">{{ libro.nombre }}</div>
                    <p class="text-gray-600 small mt-2">{{ libro.descripcion }}</p>
                    <span class="badge badge-info">Existencias: {{ libro.stock }}</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

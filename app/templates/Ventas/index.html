{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Historial de Ventas</h1>

    <div class="card shadow mb-4">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered" width="100%" cellspacing="0">
                    <thead>
                        <tr>
                            <th>Lector</th>
                            <th>Libro</th>
                            <th>Precio</th>
                            <th>Total</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for venta in lista_ventas %}
                        <tr>
                            <td>{{ venta.lector }}</td>
                            <td>{{ venta.libro }}</td>
                            <td>L. {{ venta.precio }}</td>
                            <td>L. {{ venta.total }}</td>
                            <td>
                                <a href="{{ url_for('ventas.eliminar', id=venta.id_venta) }}" 
                                   class="btn btn-danger btn-sm" 
                                   onclick="return confirm('¿Eliminar esta venta?')">
                                   <i class="fas fa-trash"></i>
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="h3 mb-4 text-gray-800">Finalizar Venta</h1>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow mb-4">
                <div class="card-header py-3 bg-success">
                    <h6 class="m-0 font-weight-bold text-white">Detalles de la Transacción</h6>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('ventas.guardar_venta') }}" method="POST">
                        <div class="form-group">
                            <label>NOMBRE DEL LECTOR:</label>
                            <input type="text" name="txtLector" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label>TÍTULO DEL LIBRO:</label>
                            <input type="text" name="txtLibro" class="form-control" value="{{ titulo_libro }}" readonly>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <label>PRECIO UNITARIO (L.):</label>
                                <input type="text" name="txtPrecio" class="form-control" value="{{ precio_libro }}" readonly>
                            </div>
                            <div class="col-md-6">
                                <label>TOTAL (L.):</label>
                                <input type="text" name="txtTotal" class="form-control" value="{{ precio_libro }}" required>
                            </div>
                        </div>

                        <hr>
                        <button type="submit" class="btn btn-success btn-block">Confirmar Venta</button>
                        <a href="{{ url_for('inventario.index') }}" class="btn btn-secondary btn-block">Regresar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Registrar Nuevo Libro</h1>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow mb-4">
                <div class="card-header py-3 bg-primary">
                    <h6 class="m-0 font-weight-bold text-white">Datos del Libro</h6>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('inventario.guardar_libro') }}" method="POST">
                        <div class="form-group">
                            <label>Código ISBN:</label>
                            <input type="text" name="txtCodigo" class="form-control" placeholder="Ej: 978-..." required>
                        </div>

                        <div class="form-group">
                            <label>Título del Libro:</label>
                            <input type="text" name="txtNombre" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label>Descripción / Género:</label>
                            <textarea name="txtDescripcion" rows="2" class="form-control"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Precio de Venta (L.):</label>
                                    <input type="number" step="0.01" name="txtPrecio" class="form-control" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label>Stock Inicial:</label>
                                    <input type="number" name="txtStock" class="form-control" required>
                                </div>
                            </div>
                        </div>

                        <hr>
                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="fas fa-save"></i> Guardar en Inventario
                        </button>
                        <a href="{{ url_for('inventario.index') }}" class="btn btn-secondary btn-block">
                            Cancelar
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

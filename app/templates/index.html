{% extends "base.html" %}

{% block content %}
<div class="container-fluid">
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800">Panel de Control - Andrea's Books</h1>
    </div>

    <div class="row">
        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Módulo</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">Ventas</div>
                            <a href="{{ url_for('ventas.index') }}" class="btn btn-primary btn-sm mt-3">Gestionar Ventas</a>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-shopping-cart fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-success shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-success text-uppercase mb-1">Módulo</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800">Inventario de Libros</div>
                            <a href="{{ url_for('inventario.index') }}" class="btn btn-success btn-sm mt-3">Ver Libros</a>
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-book fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

<div class="col-xl-4 col-md-6 mb-4">
            <div class="card border-left-info shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-info text-uppercase mb-1">Catálogo</div>
                            
                            <div class="h5 mb-0 font-weight-bold text-gray-800">Biblioteca</div>
                            <a href="{{ url_for('inventario.biblioteca') }}" class="btn btn-info btn-sm mt-3">Explorar Biblioteca</a>
                            
                        </div>
                        <div class="col-auto">
                            <i class="fas fa-library fa-2x text-gray-300"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div> </div> {% endblock %}

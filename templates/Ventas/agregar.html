<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>book purchase - UJCV BOOKS</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Georgia', serif; display: flex; justify-content: center; padding-top: 50px; }
        .form-container { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #780000; width: 400px; box-shadow: 0 0 20px rgba(120, 0, 0, 0.2); }
        h2 { color: #780000; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-size: 14px; color: #aaa; }
        input { width: 100%; padding: 10px; margin-top: 5px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        input:focus { border-color: #780000; outline: none; }
        /* Estilo para el total que es readonly */
        input[readonly] { background: #1a1a1a; color: #4CAF50; font-weight: bold; border-color: #222; }
        .btn-submit { width: 100%; padding: 12px; background: #780000; color: white; border: none; border-radius: 5px; margin-top: 25px; cursor: pointer; font-weight: bold; }
        .btn-submit:hover { background: #a00000; }
        .cancel { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2> book purchase</h2>
        <form action="/ventas/guardar" method="POST">
            <label>Nombre del Lector:</label>
            <input type="text" name="txtLector" placeholder="Ej. Juan Pérez" required autofocus>

            <label>Título del Libro:</label>
            <input type="text" name="txtLibro" value="{{ request.args.get('libro', '') }}" placeholder="Ej. It Ends With Us" required>

            <label>Precio Unitario (L.):</label>
            <input type="number" step="0.01" name="txtPrecio" id="precio" 
                   value="{{ request.args.get('precio', '') }}" 
                   oninput="document.getElementById('total').value = this.value" required>

            <label>Total de la Venta (L.):</label>
            <input type="number" step="0.01" name="txtTotal" id="total" 
                   value="{{ request.args.get('precio', '') }}" readonly>

            <button type="submit" class="btn-submit">Sellar Transacción</button>
            <a href="/ventas" class="cancel">Cancelar y Volver</a>
        </form>
    </div>

    <script>
        
        window.onload = function() {
            var p = document.getElementById('precio').value;
            if(p) {
                document.getElementById('total').value = p;
            }
        };
    </script>
</body>
</html>

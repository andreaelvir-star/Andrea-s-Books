<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Libro - UJCV BOOKS</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 30px; }
        .form-container { background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #780000; width: 450px; }
        h2 { color: #780000; text-align: center; }
        label { display: block; margin-top: 10px; color: #aaa; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: #780000; color: white; border: none; border-radius: 5px; margin-top: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2> Registrar Nuevo Libro</h2>
        <form action="/inventario/guardar" method="POST">
            <label>Código ISBN:</label>
            <input type="text" name="txtCodigo" required>

            <label>Título del Libro:</label>
            <input type="text" name="txtNombre" required>

            <label>Descripción / Género:</label>
            <textarea name="txtDescripcion" rows="2"></textarea>

            <label>Precio de Venta (L.):</label>
            <input type="number" step="0.01" name="txtPrecio" required>

            <label>Stock Inicial (Cantidad):</label>
            <input type="number" name="txtStock" required>

            <button type="submit" class="btn-save">Guardar en Inventario</button>
            <a href="/inventario" style="display:block; text-align:center; margin-top:15px; color:#888; text-decoration:none;">Cancelar</a>
        </form>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Andrea's Books" </title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Georgia', serif; text-align: center; padding-top: 50px; }
        .card { 
            display: inline-block; width: 250px; padding: 30px; margin: 20px; 
            border: 1px solid #444; border-radius: 15px; background: #1e1e1e;
            transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .card:hover { border-color: #780000; box-shadow: 0 0 15px #780000; }
        h1 { color: #780000; font-size: 3em; }
    </style>
</head>
<body>
    <h1>Andrea's Books</h1>
    <p><i>"Come, you'll find the best books at Andrea's Books"</i></p>
    <hr style="width: 50%; border: 0.5px solid #333;">

    <a href="/ventas" class="card">
        <h2> Ventas</h2>
        <p>Registrar nuevos pedidos.</p>
    </a>

    <a href="/inventario" class="card">
        <h2> Inventario</h2>
        <p>Buscar libros disponibles.</p>
    </a>
</body>
</html>
